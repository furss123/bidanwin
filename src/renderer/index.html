<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>비단윈 BidanWin</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        background: #faf9f7;
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        transition: opacity 0.2s ease;
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #splash .title-ko {
        font-size: 1.75rem;
        font-weight: 700;
        color: #1c1917;
      }
      #splash .title-en {
        font-size: 0.875rem;
        color: #78716c;
      }
      @media (prefers-color-scheme: dark) {
        #splash {
          background: #1c1c1c;
        }
        #splash .title-ko {
          color: #fafaf9;
        }
        #splash .title-en {
          color: #a8a29e;
        }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="title-ko">비단윈</div>
      <div class="title-en">BidanWin</div>
    </div>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
